# pdn-app.yaml — the pdn-bbs app package manifest (packet.net docs/app-packages.md).
#
# This manifest is authored by the app (this repo) and ships alongside the published
# self-contained binary; pdn discovers it under /usr/share/packetnet/apps/bbs (or
# /var/lib/packetnet/apps/bbs for an owner-installed copy) and never special-cases
# the app id. The BBS reaches pdn through public interfaces only: RHPv2 for the
# packet plane, the app-gateway identity contract for webmail.
#
# FIRST-RUN CONFIG — read before enabling: on first start pdn-bbs writes a commented
# default bbs.yaml into its state dir (/var/lib/packetnet/apps/bbs). UNDER PDN it does
# NOT need a callsign edited in: with the placeholder it DERIVES its on-air callsign from
# the node (<node-base>-1, probing for a free SSID if -1 is taken — like DAPPS/bpqchat),
# and additionally binds the friendly service alias `BBS` so users can `C BBS`. Set
# `callsign:` in bbs.yaml only to PIN a specific identity (it then wins over derivation).
# You will still usually want `sysop:`, `hRoute:` and your forwarding `partners:` —
# edit then disable/enable (or restart) the app. PDN_RHP_HOST/PDN_RHP_PORT and
# PDN_NODE_CALLSIGN come from the supervisor environment; the message store (bbs.db)
# lives in the same state dir. The webmail port below MUST match `web.port` in bbs.yaml.
manifest: 1
id: bbs                       # must equal the package directory name
name: BBS
version: "0.2.4"
description: Packet-radio mailbox — personal mail, bulletins and NTS traffic with FBB-compatible store-and-forward and webmail.
icon: mail
capabilities: [network, web]  # binds its own callsign over RHPv2; serves its own web UI

# The .NET daemon pdn supervises while the app is enabled. No `session:` block — the
# BBS is not a console verb; users and partner BBSes connect to its bound callsign
# over RF, and the node owner uses the webmail tile.
service:
  command: ./pdn-bbs          # relative — resolves to the published binary in this package dir
  environment: {}             # PDN_APP_STATE / PDN_RHP_HOST / PDN_RHP_PORT come from the supervisor

# pdn reverse-proxies /apps/bbs/ to the loopback upstream and shows a launcher tile.
ui:
  upstream: http://127.0.0.1:18090
  name: BBS
  icon: mail

# Tailnet port forwards (packet.net docs/network-access.md § App-declared port forwarding).
# When the node owner has the embedded Tailscale node enabled, pdn's sidecar ListenTLS's
# each `listen` port on the tailnet with the node's real Let's Encrypt cert for
# <callsign>-pdn.<tailnet>.ts.net, terminates TLS, and pipes PLAINTEXT to the BBS's loopback
# `target`. So the BBS serves IMAP/SMTP-submission as plaintext on loopback (see bbs.yaml,
# written with these defaults under pdn) and never does its own TLS — pdn owns the TLS edge
# and the trusted name, exactly as the webmail tile is plaintext-loopback behind the gateway.
# A trusted-cert IMAPS/SMTPS mailbox over Tailscale with zero cert config in the BBS.
#   - listen:  tailnet-facing port (993 = IMAPS, 465 = SMTPS); 1..65535, never 443.
#   - target:  the BBS's plaintext loopback listener (must match imap.port / smtp.port in
#              bbs.yaml under pdn). pdn rejects a non-loopback target.
#   - tls:     terminate = the sidecar adds TLS with the node cert (the BBS stays plaintext).
forward:
  - listen: 993                 # IMAPS on the tailnet
    target: 127.0.0.1:11430     # → BBS plaintext IMAP loopback (bbs.yaml imap.port)
    tls: terminate
  - listen: 465                 # SMTPS submission on the tailnet
    target: 127.0.0.1:11465     # → BBS plaintext SMTP-submission loopback (bbs.yaml smtp.port)
    tls: terminate
